<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="../../favicon.svg">
    <title>KKB Meets X – Galerie – Kindenheimer Kerweborsch</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
        --cream: #faf7f2; --cream-dark: #f0ebe0;
        --forest: #3d6b4a; --forest-mid: #5a8a68; --forest-light: #7aaa88;
        --gold: #b8792a; --gold-light: #c99040; --gold-pale: #f5e6c8;
        --text: #1c1c1c; --text-muted: #484848; --white: #ffffff;
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'Lato', sans-serif; background: var(--cream); color: var(--text); }
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 200; background: var(--forest); display: flex; align-items: center; justify-content: space-between; padding: 0 2rem; height: 58px; }
    .nav-back { color: rgba(255,255,255,0.8); text-decoration: none; font-size: 0.875rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; transition: color 0.2s; }
    .nav-back:hover { color: var(--gold-light); }
    .nav-brand { font-family: 'Playfair Display', serif; color: var(--gold-light); font-size: 1rem; font-weight: 700; text-decoration: none; }
    .hero-sub { min-height: 38vh; background: var(--forest); display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 7rem 2rem 4rem; }
    .hero-sub .icon { font-size: 4rem; margin-bottom: 1rem; }
    .hero-sub h1 { font-family: 'Playfair Display', serif; font-size: clamp(2rem, 7vw, 3.5rem); font-weight: 900; color: var(--white); line-height: 1.1; margin-bottom: 0.75rem; }
    .hero-sub p { color: rgba(255,255,255,0.92); font-size: 1rem; max-width: 480px; line-height: 1.7; }
    .content { max-width: 1000px; margin: 0 auto; padding: 3.5rem 2rem 5rem; }
    .year-header { font-family: 'Playfair Display', serif; font-size: 2rem; color: var(--forest); border-bottom: 3px solid var(--gold); padding-bottom: 0.5rem; margin-bottom: 2rem; }
    .sub-header { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--text); margin-bottom: 1.25rem; }
    .media-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 3rem; }
    .media-item { border-radius: 10px; overflow: hidden; background: #111; aspect-ratio: 4/3; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; }
    .media-item:hover { transform: scale(1.02); box-shadow: 0 6px 20px rgba(0,0,0,0.2); }
    .media-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .media-item video { width: 100%; height: 100%; object-fit: cover; display: block; }
    .media-item.video-item { cursor: default; }
    .media-item.video-item:hover { transform: none; box-shadow: none; }
    @media (max-width: 768px) { .media-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 480px) { .media-grid { grid-template-columns: 1fr; } }
    /* Lightbox */
    .lightbox { display: none; position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.92); align-items: center; justify-content: center; padding: 2rem; }
    .lightbox.active { display: flex; }
    .lightbox img { max-width: 100%; max-height: 90vh; border-radius: 8px; object-fit: contain; }
    .lightbox-close { position: absolute; top: 1rem; right: 1.5rem; color: white; font-size: 2.5rem; cursor: pointer; line-height: 1; opacity: 0.8; transition: opacity 0.2s; background: none; border: none; }
    .lightbox-close:hover { opacity: 1; }
    footer { background: #111e12; padding: 2rem; text-align: center; }
    footer p { font-size: 0.82rem; color: rgba(255,255,255,0.35); }
    footer span { color: var(--gold); opacity: 0.8; }
    </style>
</head>
<body>
<nav>
    <a href="../" class="nav-back">← Zurück zur Galerie</a>
    <a href="../../" class="nav-brand">🎡 Kindenheimer Kerweborsch</a>
</nav>
<section class="hero-sub">
    <div class="icon">🎉</div>
    <h1>KKB Meets X – Galerie</h1>
    <p>Fotos &amp; Videos aus unseren Überraschungs-Events</p>
</section>
<div class="content">
    <h2 class="year-header">2026</h2>
    <h3 class="sub-header">🚌 DJ Bus</h3>
    <div class="media-grid">
        <div class="media-item" onclick="openLightbox(this)" data-src="../../meets-x/gallery-1.jpg">
            <img src="../../meets-x/gallery-1.jpg" alt="DJ Bus 2026 – Foto 1">
        </div>
        <div class="media-item" onclick="openLightbox(this)" data-src="../../meets-x/gallery-2.jpg">
            <img src="../../meets-x/gallery-2.jpg" alt="DJ Bus 2026 – Foto 2">
        </div>
        <div class="media-item video-item">
            <video src="../../meets-x/gallery-1.mp4" controls playsinline preload="metadata"></video>
        </div>
        <div class="media-item video-item">
            <video src="../../meets-x/gallery-2.mp4" controls playsinline preload="metadata"></video>
        </div>
    </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
    <button class="lightbox-close" onclick="closeLightbox()">&times;</button>
    <img id="lightbox-img" src="" alt="">
</div>

<footer>
    <p>© 2026 <span>Kindenheimer Kerweborsch</span></p>
</footer>
<script>
function openLightbox(el) {
    const src = el.getAttribute('data-src');
    document.getElementById('lightbox-img').src = src;
    document.getElementById('lightbox').classList.add('active');
    document.body.style.overflow = 'hidden';
}
function closeLightbox(e) {
    if (e && e.target !== document.getElementById('lightbox') && e.target.className !== 'lightbox-close') return;
    document.getElementById('lightbox').classList.remove('active');
    document.getElementById('lightbox-img').src = '';
    document.body.style.overflow = '';
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });
</script>
</body>
</html>
